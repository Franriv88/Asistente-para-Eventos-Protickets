<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Protickets</title>
    <link rel="icon" type="image/png" href="./img/logoPT.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>

<div class="container">

    <!-- SECCIÓN: ACCESOS RÁPIDOS -->
    <div class="snippets-section">
        <h3>⚡ Accesos Rápidos</h3>
        <p>Copia tus códigos frecuentes con un solo click.</p>
        
        <div class="snippets-grid">
            <button class="btn-snippet" onclick="copiarCodigo('quentro')">
                <img id="quentroLogo" src="./img/QuentroBlack.png" alt="Quentro">
            </button>
            
            <button class="btn-snippet" onclick="copiarCodigo('css')">
                🎨 CSS para Landing
            </button>
        </div>
    </div>

    <hr style="opacity: 0.1; margin: 40px 0;">

    <!-- SECCIÓN: ANALIZADOR DE IMAGEN -->
    <h2>Subir Imagen & Analizar</h2>
    
    <div class="drop-zone" id="dropZone">
        <p>Arrastra tu imagen aquí o haz click</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div class="status" id="statusText"></div>
    <img id="preview" class="preview" crossorigin="anonymous">

    <div class="input-group">
        <label>URL de Imagen (Para Backgrounds):</label>
        <div class="row">
            <input type="text" id="urlOutput" placeholder="Aquí aparecerá tu URL..." readonly>
            <button onclick="copiarInput('urlOutput')" class="btn-copy">Copiar</button>
        </div>
    </div>

    <!-- SECCIÓN: PALETA DE COLORES -->
    <div id="paletteSection" style="display:none; margin-top: 40px;">
        <h3>Paleta Detectada</h3>
        <div id="paletteContainer" class="palette-grid"></div>
    </div>

    <hr style="opacity: 0.1; margin: 40px 0;">

    <!-- SECCIÓN: GENERADOR DE ONDAS -->
    <div class="wave-generator-section">
        <h3>🌊 Generador de Ondas Protickets (1920x277)</h3>
    
        <div class="wave-controls">
            <!-- Selector de Colores Dinámicos -->
            <label>Colores de la Onda:</label>
            <div id="colorsContainer" class="colors-flex"></div>
            <button onclick="addColor()" class="btn-mini-add" style="margin-bottom: 20px;">+ Añadir Color</button>
            
            <!-- Botones de Estilo -->
            <div class="control-group" style="width: 100%;">
                <label>Selecciona el Estilo de Onda:</label>
                <div id="waveStyleButtons" class="style-grid">
                    <button class="btn-style active" data-value="sinusoidal">Hilos</button>
                    <button class="btn-style" data-value="bars">Barras</button>
                    <button class="btn-style" data-value="pulse">Pulsos</button>
                    <button class="btn-style" data-value="electro">Electro</button>
                    <button class="btn-style" data-value="bubbles">Burbujas</button>
                    <button class="btn-style" data-value="bubbles_pro">Burbujas Pro</button>
                    <button class="btn-style" data-value="stars">Nebulosa</button>
                    <button class="btn-style" data-value="dna">ADN</button>
                    <button class="btn-style" data-value="rock">Rock</button>
                    <button class="btn-style" data-value="fire">Fuego</button>
                    <button class="btn-style" data-value="smoke">Humo</button>
                    <button class="btn-style" data-value="cyber">Cyber</button>
                    <button class="btn-style" data-value="glitch">Glitch</button>
                    <button class="btn-style" data-value="podcast">Podcast</button>
                    <button class="btn-style" data-value="vinyl">Vinyl</button>
                </div>
                <input type="hidden" id="waveStyle" value="sinusoidal">
            </div>
        
            <!-- Control de Grosor -->
            <div class="control-group">
                <label>Grosor del Trazo: <span id="thicknessValue">2px</span></label>
                <input type="range" id="waveThickness" min="1" max="20" value="2" oninput="dibujarOnda()">
            </div>

            <!-- Toggle de Fondo -->
            <div class="control-group">
                <label>Fondo de Previsualización:</label>
                <div class="preview-toggle">
                    <button class="btn-toggle active" onclick="cambiarFondoPreview('black', this)">Negro</button>
                    <button class="btn-toggle" onclick="cambiarFondoPreview('white', this)">Blanco</button>
                </div>
            </div>

            <!-- Contenedor del Canvas (Evita el desborde) -->
            <div class="canvas-preview-container" id="canvasWrapper" style="background: #000; margin-top: 20px;">
                <canvas id="waveCanvas" width="1920" height="277"></canvas>
            </div>
        </div>

        <button onclick="descargarOnda()" class="btn-snippet" style="margin: 20px auto; background: #28a745; color: white; width: 100%;">
            💾 Descargar PNG Transparente (1920x277)
        </button>
    </div>

</div>

</body>
</html>
