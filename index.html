<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Protickets</title>
    <link rel="icon" type="image/png" href="./img/logoPT.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>
<body>

<div class="container">

    <div class="snippets-section">
        <h3>⚡ Accesos Rápidos</h3>
        <p>Copia tus códigos frecuentes con un solo click.</p>
        
        <div class="snippets-grid">
            <button class="btn-snippet" onclick="copiarCodigo('quentro')">
                <img id="quentroLogo" src="./img/QuentroBlack.png" alt="">
            </button>
            
            <button class="btn-snippet" onclick="copiarCodigo('css')">
                🎨 CSS para Landing
            </button>
        </div>
    </div>

    <h2>Subir Imagen & Analizar</h2>
    
    <div class="drop-zone" id="dropZone">
        <p>Arrastra tu imagen aquí o haz click</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <div class="status" id="statusText"></div>
    <img id="preview" class="preview" crossorigin="anonymous">

    <div class="input-group">
        <label>URL de Imagen (Para Backgrounds):</label>
        <div class="row">
            <input type="text" id="urlOutput" placeholder="Aquí aparecerá tu URL..." readonly>
            <button onclick="copiarInput('urlOutput')" class="btn-copy">Copiar</button>
        </div>
    </div>

    <div id="paletteSection" style="display:none; margin-top: 40px;">
        <h3>Paleta Detectada</h3>
        <div id="paletteContainer" class="palette-grid">
            </div>
    </div>

    <div class="wave-generator-section">
        <h3>🌊 Generador de Ondas Protickets (1920x277)</h3>
    
        <div class="wave-controls">
            <div id="colorsContainer" class="colors-flex">
                <!-- Los colores se generan aquí dinámicamente -->
            </div>
            <button onclick="addColor()" class="btn-mini-add">+ Añadir Color</button>
            
            <div class="control-group">
                <label>Estilo de Onda:</label>
                <select id="waveStyle" onchange="dibujarOnda()">
                    <option value="sinusoidal">Hilos Entrelazados (Sutil)</option>
                    <option value="bars">Barras de Audio (Imagen 4.png)</option>
                    <option value="pulse">Pulsos Eléctricos (Múltiples)</option>
                    <option value="electro">Electrocardiograma (Triangular)</option>
                    <option value="bubbles">Burbujas Clásicas (Rellenas)</option>
                    <option value="bubbles_pro">Burbujas Pro (Mezcla)</option>
                    <option value="stars">Nebulosa (Partículas de Polvo)</option>
                    <option value="dna">ADN / Conexiones</option>
                    <option value="rock">Rock / Energía (Picos)</option>
                    <option value="fire">Llamas de Energía (Fuego)</option>
                    <option value="smoke">Humo Orgánico (Fluido)</option>
                    <option value="cyber">Digital / Cyber (Bloques)</option>
                    <option value="glitch">Glitch / Trap (Cortes)</option>
                    <option value="podcast">Voz / Podcast (Espejado)</option>
                    <option value="vinyl">Vintage Vinyl</option>
                </select>
            </div>
        </div>
        
        <div class="control-group">
            <label>Grosor del Trazo:</label>
            <input type="range" id="waveThickness" min="1" max="20" value="2" oninput="dibujarOnda()">
            <span id="thicknessValue">2px</span>
        </div>
        <div class="canvas-container" style="background: #111; padding: 10px; border-radius: 8px;">
            <!-- Tamaño fijo solicitado -->
            <canvas id="waveCanvas" width="1920" height="277"></canvas>
        </div>

        <button onclick="descargarOnda()" class="btn-snippet" style="margin: 20px auto; background: #28a745; color: white; width: 100%;">
            💾 Descargar PNG Transparente (1920x277)
        </button>
    </div>

</div>



</body>
</html>
